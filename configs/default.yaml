run:
  seed: 42
  output_dir: outputs
  experiment:
    max_trials: 30
    patience: 3

llm:
  enabled: true
  provider: openai_compatible
  base_url: https://llm-xur4gfd4busltusy.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
  api_key_env: LLM_API_KEY
  model: "qwen-plus"
  temperature: 0.2
  max_tokens: 800
  timeout_seconds: 120
  max_retries: 2

agent_prompts:
  planner_path: configs/prompts/planner.md
  scientist_path: configs/prompts/scientist.md
  engineer_path: configs/prompts/engineer.md
  reviewer_path: configs/prompts/reviewer.md

memory:
  mode: jsonl
  recent_k: 20
  long_term_k: 20

controller:
  explore_ratio: 0.3
  optimize_ratio: 0.5
  stabilize_ratio: 0.2
  improvement_threshold: 1.0e-6
  max_rounds:

data:
  classification:
    npz_path: data/classification_a/A1.npz
    sample_submission_path: data/classification_a/sample_submission.csv
    val_ratio: 0.1
  recommendation:
    train_csv_path: data/recommendation_a/train.csv
    test_csv_path: data/recommendation_a/test.csv
    user_csv_path: data/recommendation_a/user.csv
    item_csv_path: data/recommendation_a/item.csv
    sample_submission_path: data/recommendation_a/sample_submission.csv
    val_ratio: 0.1

search_space:
  classification:
    candidates:
      - kind: graphsage
        hidden_dim: 64
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
        patience: 5
      - kind: gcn
        hidden_dim: 64
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
        patience: 5
      - kind: graph_transformer
        hidden_dim: 64
        num_layers: 2
        num_heads: 4
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
        patience: 5
    mutation_rules:
      graphsage:
        hidden_dim:
          values: [32, 64, 128]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
        patience:
          values: [3, 5, 10]
      gcn:
        hidden_dim:
          values: [32, 64, 128]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
        patience:
          values: [3, 5, 10]
      graph_transformer:
        hidden_dim:
          values: [32, 64, 128]
        num_layers:
          values: [1, 2, 3]
        num_heads:
          values: [2, 4, 8]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
        patience:
          values: [3, 5, 10]
  recommendation:
    candidates:
      - kind: gru4rec
        hidden_dim: 64
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
        patience: 5
      - kind: lightgcn
        hidden_dim: 64
        num_layers: 2
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
        patience: 5
      - kind: graph_transformer
        hidden_dim: 64
        num_layers: 2
        num_heads: 4
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
        patience: 5
      - kind: bert4rec
        hidden_dim: 64
        num_layers: 2
        num_heads: 4
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
        patience: 5
    mutation_rules:
      gru4rec:
        hidden_dim:
          values: [32, 64, 128]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
        patience:
          values: [3, 5, 10]
      lightgcn:
        hidden_dim:
          values: [32, 64, 128]
        num_layers:
          values: [1, 2, 3]
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
        patience:
          values: [3, 5, 10]
      graph_transformer:
        hidden_dim:
          values: [32, 64, 128]
        num_layers:
          values: [1, 2, 3]
        num_heads:
          values: [2, 4, 8]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
        patience:
          values: [3, 5, 10]
      bert4rec:
        hidden_dim:
          values: [32, 64, 128]
        num_layers:
          values: [1, 2, 3]
        num_heads:
          values: [2, 4, 8]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
        patience:
          values: [3, 5, 10]

submission:
  a1_filename: A1.csv
  a2_filename: A2.csv
  zip_filename: prediction.zip
