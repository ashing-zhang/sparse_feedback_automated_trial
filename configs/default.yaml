run:
  seed: 42
  output_dir: outputs
  experiment:
    max_trials: 10
    patience: 3

llm:
  enabled: true
  provider: openai_compatible
  base_url: https://llm-xur4gfd4busltusy.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
  api_key_env: LLM_API_KEY
  model: "qwen-plus"
  temperature: 0.2
  max_tokens: 800
  timeout_seconds: 120
  max_retries: 2

agent_prompts:
  planner_path: configs/prompts/planner.md
  scientist_path: configs/prompts/scientist.md
  engineer_path: configs/prompts/engineer.md
  reviewer_path: configs/prompts/reviewer.md

memory:
  mode: jsonl
  recent_k: 30
  long_term_k: 200

controller:
  explore_ratio: 0.3
  optimize_ratio: 0.5
  stabilize_ratio: 0.2
  improvement_threshold: 1.0e-6
  max_rounds:

data:
  classification:
    npz_path: data/classification_a/A1.npz
    sample_submission_path: data/classification_a/sample_submission.csv
    val_ratio: 0.1
  recommendation:
    train_csv_path: data/recommendation_a/train.csv
    test_csv_path: data/recommendation_a/test.csv
    user_csv_path: data/recommendation_a/user.csv
    item_csv_path: data/recommendation_a/item.csv
    sample_submission_path: data/recommendation_a/sample_submission.csv
    val_ratio: 0.1

search_space:
  classification:
    candidates:
      - kind: label_propagation
        max_iter: 50
        alpha: 0.8
      - kind: label_propagation
        max_iter: 100
        alpha: 0.9
      - kind: logistic_regression
        c: 1.0
        max_iter: 200
      - kind: logistic_regression
        c: 4.0
        max_iter: 300
      - kind: graphsage
        hidden_dim: 64
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
      - kind: gcn
        hidden_dim: 64
        dropout: 0.5
        learning_rate: 0.01
        weight_decay: 5.0e-4
        epochs: 200
    mutation_rules:
      label_propagation:
        alpha:
          min: 0.7
          max: 0.95
          step: 0.05
        max_iter:
          values: [50, 100, 150, 200]
      logistic_regression:
        c:
          values: [0.25, 0.5, 1.0, 2.0, 4.0, 8.0]
        max_iter:
          values: [100, 200, 300, 500]
      graphsage:
        hidden_dim:
          values: [32, 64, 128]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
      gcn:
        hidden_dim:
          values: [32, 64, 128]
        dropout:
          min: 0.0
          max: 0.7
          step: 0.1
        learning_rate:
          values: [0.001, 0.003, 0.01]
        weight_decay:
          values: [0.0, 5.0e-4, 1.0e-3]
        epochs:
          values: [100, 200, 300]
  recommendation:
    candidates:
      - kind: popularity
      - kind: cooc_popularity
        cooc_window: 50
        cooc_weight: 1.0
        popularity_weight: 0.2
    mutation_rules:
      cooc_popularity:
        cooc_window:
          values: [10, 30, 50, 80, 120]
        cooc_weight:
          values: [0.5, 1.0, 1.5, 2.0]
        popularity_weight:
          values: [0.0, 0.1, 0.2, 0.4, 0.6]

submission:
  a1_filename: A1.csv
  a2_filename: A2.csv
  zip_filename: prediction.zip
